apiVersion: v1
kind: ServiceAccount
metadata:
  name: oikos-workflow-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oikos-workflow-runner
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oikos-workflow-runner
subjects:
  - kind: ServiceAccount
    name: oikos-workflow-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oikos-workflow-runner
