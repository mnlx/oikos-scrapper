apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oikos-scrape
spec:
  entrypoint: run-all
  serviceAccountName: oikos-workflow-runner
  arguments:
    parameters:
      - name: run-mode
        value: manual
      - name: publish-select
        value: +tag:gold
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterCompletion: 86400
  templates:
    - name: run-all
      steps:
        # Run DB migrations first
        - - name: migrate
            template: run-migrate
        # Ingest all groups in parallel
        - - name: ingest-agencies
            template: run-ingest
            arguments:
              parameters:
                - name: group
                  value: agency
          - name: ingest-developers
            template: run-ingest
            arguments:
              parameters:
                - name: group
                  value: developer
        - - name: parse-bronze
            template: run-parse
        # Geocode and LLM enrichment are independent — run in parallel
        - - name: enrich-geocodes
            template: run-enrich-geocodes
          - name: llm-enrich
            template: run-llm-enrich
        - - name: publish-api
            template: run-publish
    - name: run-migrate
      container:
        image: ghcr.io/mnlx/oikos-scrapper:deploy-oikos-medallion
        imagePullPolicy: Always
        command:
          - oikos
        args:
          - migrate
        envFrom:
          - secretRef:
              name: oikos-scrapper-env
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 256Mi
    - name: run-ingest
      inputs:
        parameters:
          - name: group
      container:
        image: ghcr.io/mnlx/oikos-scrapper:deploy-oikos-medallion
        imagePullPolicy: Always
        command:
          - oikos
        args:
          - ingest
          - --run-mode
          - "{{workflow.parameters.run-mode}}"
          - --group
          - "{{inputs.parameters.group}}"
          - --config
          - /etc/oikos/sources.yaml
        envFrom:
          - secretRef:
              name: oikos-scrapper-env
        volumeMounts:
          - name: source-config
            mountPath: /etc/oikos
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 3Gi
    - name: run-parse
      container:
        image: ghcr.io/mnlx/oikos-scrapper:deploy-oikos-medallion
        imagePullPolicy: Always
        command:
          - oikos
        args:
          - parse
          - --config
          - /etc/oikos/sources.yaml
        envFrom:
          - secretRef:
              name: oikos-scrapper-env
        volumeMounts:
          - name: source-config
            mountPath: /etc/oikos
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 3Gi
    - name: run-publish
      container:
        image: ghcr.io/mnlx/oikos-scrapper:deploy-oikos-medallion
        imagePullPolicy: Always
        command:
          - oikos
        args:
          - publish
          - --select
          - "{{workflow.parameters.publish-select}}"
        envFrom:
          - secretRef:
              name: oikos-scrapper-env
        volumeMounts:
          - name: source-config
            mountPath: /etc/oikos
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
    - name: run-enrich-geocodes
      container:
        image: ghcr.io/mnlx/oikos-scrapper:deploy-oikos-medallion
        imagePullPolicy: Always
        command:
          - oikos
        args:
          - enrich-geocodes
          - --limit
          - "300"
          - --config
          - /etc/oikos/sources.yaml
        envFrom:
          - secretRef:
              name: oikos-scrapper-env
        volumeMounts:
          - name: source-config
            mountPath: /etc/oikos
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
    - name: run-llm-enrich
      container:
        image: ghcr.io/mnlx/oikos-scrapper:deploy-oikos-medallion
        imagePullPolicy: Always
        command:
          - oikos
        args:
          - llm-enrich
          - --limit
          - "200"
          - --config
          - /etc/oikos/sources.yaml
        envFrom:
          - secretRef:
              name: oikos-scrapper-env
        volumeMounts:
          - name: source-config
            mountPath: /etc/oikos
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
  volumes:
    - name: source-config
      configMap:
        name: oikos-scrapper-config
